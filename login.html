<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Retail POS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email (e.g. cashier@pos.com)" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Enter System</button>
        </form>
    </div>

    <script>
        // THIS IS WHERE THE JAVASCRIPT GOES
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('login_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await res.json();

                if (result.success) {
                    // Redirect based on role
                    if (result.role === 'Admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert("Error: " + result.error);
                }
            } catch (err) {
                alert("Could not connect to server. Check if XAMPP is running.");
            }
        };
    </script>
</body>
</html>
