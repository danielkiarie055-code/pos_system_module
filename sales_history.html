<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Sales History</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f4f7f6; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; margin: 0; background: #1a252f; }
        .sidebar a { color: white; text-decoration: none; padding: 15px 20px; display: block; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .sidebar a:hover { background: #34495e; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        h1 { color: #333; margin-top: 0; }

        /* Data Table & Controls */
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .search-bar { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="admin.html">📊 Dashboard</a>
        <a href="admin.html#add-product-section">📦 Add Products</a>
        <a href="sales_history.html" style="background: #34495e;">🧾 Sales History</a>
        <a href="index.html">🛒 Go to POS</a>
        <a href="logout.php" style="color: #ff4757; margin-top: auto;">🚪 Logout</a>
    </div>

    <div class="main-content">
        <h1>Sales History</h1>
        
        <div class="controls">
            <input type="text" id="search-sales" class="search-bar" placeholder="Search by Receipt No. or Cashier...">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Receipt No.</th>
                        <th>Date & Time</th>
                        <th>Cashier</th>
                        <th>Method</th>
                        <th>Amount (KES)</th>
                    </tr>
                </thead>
                <tbody id="sales-table-body">
                    <tr><td colspan="5">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="sales.js"></script>
</body>
</html>
